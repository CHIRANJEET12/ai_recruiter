ai_usage_summary: |
  Used ChatGPT for architectural discussions, debugging, and implementation guidance while developing the candidate retrieval and ranking pipeline.
  AI assistance was used to review code structure, troubleshoot issues, and discuss improvements for BM25 retrieval, embedding retrieval, hybrid ranking, and reranking strategies. 
  All implementation, integration, testing, and design decisions were completed by the developer. No candidate data was shared with external AI services beyond the provided hackathon dataset.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  The solution follows a multi-stage candidate retrieval and ranking pipeline
  designed to balance retrieval quality, semantic understanding, and execution
  efficiency.

  Candidate profiles are first converted into rich textual documents by combining
  profile information, skills, career history, education, certifications, and
  important platform signals such as recruiter response rate, GitHub activity,
  open-to-work status, notice period, and relocation preference.

  The first retrieval stage uses BM25 to efficiently identify candidates with
  strong lexical overlap with the job description. This is complemented by a
  semantic retrieval stage using BGE embeddings to capture contextual similarity
  beyond exact keyword matching. The normalized scores from both methods are
  combined through weighted hybrid retrieval to produce an initial ranked list.

  The hybrid retriever prioritizes recall, ensuring that relevant candidates are
  not missed even when their profiles use different terminology than the job
  description.

  The retrieved candidates are then prepared for a Cross-Encoder reranking stage,
  where the job description and candidate profile are jointly evaluated to improve
  ranking precision. This stage is followed by an intelligence-based scoring
  module that incorporates behavioral signals, production experience, recruiter
  engagement, and other domain-specific heuristics to generate the final ranking.

  The architecture is modular, extensible, and optimized to scale to large
  candidate pools while maintaining high retrieval quality.

  The project was developed collaboratively by a three-member team, with my
  primary contribution focused on designing and implementing the candidate
  retrieval pipeline, including BM25 retrieval, embedding-based retrieval,
  hybrid ranking, data preprocessing, and the modular retrieval architecture.

